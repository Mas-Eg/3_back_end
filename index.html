<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="content-header">

        <div class="myform">
            <h2 id="form">Форма</h2>
            <form action="form.php" method="POST">
                <div class="form-group">
                    <label for="name-input">ФИО:</label>
                    <input id="name-input" name="fio" type="name" placeholder="Иванов Иван Иванович" />
                </div>
                <div class="form-group">
                    <label for="tel-input">Телефон:</label>
                    <input id="tel-input" name="phone" type="tel" placeholder="+7**********" />
                </div>
                <div class="form-group">
                    <label for="email-input">email:</label>
                    <input id="email-input" name="email" type="email" placeholder="Введите вашу почту" />
                </div>
                <div class="form-group">
                    <label for="birth_date">Дата рождения:</label>
                    <input id="birth_date" name="birth_date" value="2026-01-01" type="date" />
                </div>
                <div class="form-group">
                    <span>Пол:</span>
                    <label><input type="radio" checked="checked" name="gender" value="M" /> Мужской</label>
                    <label><input type="radio" name="gender" value="F" /> Женский</label>
                </div>
                <div class="form-group">
                    <label for="lang-select">Ваш любимый язык программирования:</label>
                    <select id="lang-select" name="languages[]" multiple="multiple">
                        <option value="Значение1">Pascal</option>
                        <option value="Значение2" selected="selected">C</option>
                        <option value="Значение3" selected="selected">C++</option>
                        <option value="Значение4" selected="selected">JavaScript</option>
                        <option value="Значение5" selected="selected">PHP</option>
                        <option value="Значение6" selected="selected">Python</option>
                        <option value="Значение7" selected="selected">Java</option>
                        <option value="Значение8" selected="selected">Haskel</option>
                        <option value="Значение9" selected="selected">Clojure</option>
                        <option value="Значение10" selected="selected">Prolog</option>
                        <option value="Значение11" selected="selected">Scala</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bio-textarea">Биография:</label>
                    <textarea id="bio-textarea" name="bio">Немного о себе</textarea>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" checked="checked" name="agreement" /> с контрактом ознакомлен (-а)</label>
                </div>
                <input type="submit" value="Сохранить" class="knopka" />
            </form>
        </div>

    </div>
</body>
</html>
